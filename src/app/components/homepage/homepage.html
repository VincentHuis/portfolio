<section id="home" class="homepage">
  <div class="homepage-content">
    <div class="hero-left">
      <div class="hero-label">
        <span class="label-dot"></span>
        <span class="label-text">Full Stack Developer</span>
      </div>
      <h1 class="hero-name">
        <span class="name-line">Vincent</span>
        <span class="name-line name-outline">Huisman</span>
      </h1>
      <p class="hero-stack">
        <span class="stack-item">Java</span>
        <span class="stack-sep">/</span>
        <span class="stack-item">Python</span>
        <span class="stack-sep">/</span>
        <span class="stack-item">.NET</span>
      </p>
    </div>
    @if (imageVisible) {
      <div class="hero-right">
        <div class="terminal-window" [style.transform]="'scale(' + imageScale + ')'"
             [style.transform-origin]="'top right'">
          <div class="terminal-titlebar">
            <div class="terminal-dots">
              <span class="dot dot-red" (click)="closeImage()"></span>
              <span class="dot dot-yellow" (click)="shrinkImage()"></span>
              <span class="dot dot-green" (click)="growImage()"></span>
            </div>
            <span class="terminal-title">vincent.jpg</span>
            <div class="terminal-dots-spacer"></div>
          </div>
          <div class="terminal-body">
            <img [src]="currentImage" alt="Vincent Huisman" class="hero-image">
          </div>
        </div>
      </div>
    }
  </div>
  <div class="scroll-indicator">
    <span class="scroll-line"></span>
  </div>
</section>
