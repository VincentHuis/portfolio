<section id="projecten" class="projecten-section">
    <div class="section-header">
    <span class="section-label">
      <span class="label-index">01</span>
      <span class="label-line"></span>
      <span class="label-name">Projecten</span>
    </span>
        <h2 class="section-title">
            <span>Ik maak het</span>
            <app-text-rotate
                    [texts]="rotatingTexts"
                    [rotationInterval]="2200"
                    mainClassName="rotate-highlight"
                    charClassName="rotate-char"
            ></app-text-rotate>
        </h2>
    </div>

    <div class="bento-grid">
        @for (project of projects; track project.slug; let i = $index) {
            <div class="bento-card bento-card-{{ i }}" (click)="openProject(project)">
                <div class="card-image">
                    <img [src]="project.image" [alt]="project.title">
                    <div class="card-fade"></div>
                    <span class="card-year">{{ project.year }}</span>
                </div>
                <div class="card-body">
                    <span class="card-sub">{{ project.subtitle }}</span>
                    <h3 class="card-title">{{ project.title }}</h3>
                    <p class="card-desc">{{ project.description }}</p>
                    <div class="pill-row">
                        @for (tech of project.technologies; track tech) {
                            <span class="pill">{{ tech }}</span>
                        }
          </div>
        </div>
            </div>
        }
  </div>
</section>

<app-project-modal
        [project]="selectedProject"
        (closed)="closeProject()"
></app-project-modal>
