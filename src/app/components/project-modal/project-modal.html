@if (project) {
  <div class="modal-backdrop" @backdrop (click)="onBackdropClick($event)">
    <div class="modal-panel" @panel>
      <div class="modal-header">
        <div class="modal-header-img">
          <img [src]="project.image" [alt]="project.title">
          <div class="modal-header-fade"></div>
        </div>
        <button class="modal-close" (click)="close()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
        <div class="modal-header-info">
          <span class="modal-year">{{ project.year }}</span>
          <h2 class="modal-title">{{ project.title }}</h2>
          <p class="modal-subtitle">{{ project.subtitle }}</p>
        </div>
      </div>

      <div class="modal-body">
        <div class="modal-tech-section">
          <span class="modal-tech-label">Technologieën</span>
          <div class="modal-tech-list">
            @for (tech of project.technologies; track tech) {
              <span class="modal-tech">{{ tech }}</span>
            }
          </div>
        </div>

        <div class="modal-description" [innerHTML]="project.detailedDescription"></div>

        @if (project.link) {
          <a [href]="project.link" target="_blank" class="modal-link">
            Bezoek website
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
            </svg>
          </a>
        }
      </div>
    </div>
  </div>
}
